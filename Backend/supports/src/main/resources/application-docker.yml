server:
  port: 8085

spring:
  application:
    name: supports-service
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER:donatech}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /supports/v3/api-docs
    config-url: /supports/v3/api-docs/swagger-config
    urls:
      - name: Supports API
        url: /supports/v3/api-docs

resilience4j:
  circuitbreaker:
    instances:
      users-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      users-service:
        timeoutDuration: 3s
