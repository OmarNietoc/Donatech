name: donatech-backend

services:

  # ─────────────────────────────────────────
  # Infraestructura (Entorno Local Centralizado)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: donatech-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
      - ./db/init-schemas.sh:/docker-entrypoint-initdb.d/init-schemas.sh
      - ./db/init-schemas.sql:/docker-schemas/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: donatech-rabbitmq
    env_file:
      - .env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Service Discovery
  # ─────────────────────────────────────────
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: donatech-discovery
    image: donatech/discovery-server:latest
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Microservicios
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: donatech-auth
    image: donatech/auth-service:latest
    env_file:
      - .env
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  users-service:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: donatech-users
    image: donatech/users-service:latest
    env_file:
      - .env
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/donatech
      USERS_DB_USER: users_user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - users-images-data:/app/images

  catalog-service:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    container_name: donatech-catalog
    image: donatech/catalog-service:latest
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/donatech
      CATALOG_DB_USER: catalog_user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - catalog-images-data:/app/images

  order-service:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: donatech-order
    image: donatech/order-service:latest
    env_file:
      - .env
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/donatech
      ORDER_DB_USER: order_user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - order-images-data:/app/images

  supports-service:
    build:
      context: ./supports
      dockerfile: Dockerfile
    container_name: donatech-supports
    image: donatech/supports-service:latest
    env_file:
      - .env
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/donatech
      SUPPORTS_DB_USER: supports_user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: donatech-notification
    image: donatech/notification-service:latest
    env_file:
      - .env
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  shipping-service:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    container_name: donatech-shipping
    image: donatech/shipping-service:latest
    env_file:
      - .env
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/donatech
      SHIPPING_DB_USER: shipping_user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Microservicio IA — Kit Personalizado
  # ─────────────────────────────────────────
  kit-ia-service:
    build:
      context: ./kit-ia-service
      dockerfile: Dockerfile
    container_name: donatech-kit-ia
    image: donatech/kit-ia-service:latest
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      # Config no-sensible inline (patrón del proyecto); secretos LLM vía .env
      DB_HOST: postgres
      DB_NAME: donatech
      DB_USER: catalog_user
      DB_PASSWORD: ${CATALOG_DB_PASS}
      DB_SCHEMA: catalog
      MS_KITS_URL: http://catalog-service:8081
      USERS_URL: http://users-service:8083
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      APP_NAME: kit-ia-service
      APP_HOST: kit-ia-service
      APP_PORT: 8001
      OLLAMA_BASE_URL: http://ollama:11434/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/kit-ia/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    container_name: donatech-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama-data:/root/.ollama
    # Arranca el server y descarga el modelo de fallback al volumen (idempotente).
    # $$ escapa la interpolación de compose para que lo expanda el shell del contenedor.
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        srv=$$!
        until ollama ls >/dev/null 2>&1; do sleep 1; done
        ollama pull "$$OLLAMA_MODEL" || true
        wait $$srv

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: donatech-gateway
    image: donatech/api-gateway:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy

volumes:
  postgres-data-local:
  catalog-images-data:
  order-images-data:
  users-images-data:
  ollama-data:
