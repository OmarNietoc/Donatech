server:
  port: 8083

spring:
  application:
    name: users-service
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  datasource:
    url: ${DB_URL}
    username: ${USERS_DB_USER:users_user}
    password: ${USERS_DB_PASS:users_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET search_path TO users"
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        default_schema: users
  sql:
    init:
      mode: always

donatech:
  app:
    jwtSecret: ${JWT_SECRET:donatechSecretKey12345678901234567890123456789012}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /users/v3/api-docs
    config-url: /users/v3/api-docs/swagger-config
    urls:
      - name: Users API
        url: /users/v3/api-docs
