server:
  port: 8080

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
  cloud:
    discovery:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/api/auth/**

        - id: catalog-service
          uri: http://catalog-service:8081
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/units/**, /api/kits/**, /api/necesidades/**, /api/campaigns/**
          filters:
            - AuthenticationFilter

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**, /api/donations/**
          filters:
            - AuthenticationFilter

        - id: users-service
          uri: http://users-service:8083
          predicates:
            - Path=/api/users/**, /api/regions/**, /api/comunas/**, /api/beneficiaries/**, /api/zonas-catastrofe/**
          filters:
            - AuthenticationFilter

        - id: supports-service
          uri: http://supports-service:8085
          predicates:
            - Path=/api/supports/**
          filters:
            - AuthenticationFilter

        - id: shipping-service
          uri: http://shipping-service:8087
          predicates:
            - Path=/api/shipments/**, /api/routes/**
          filters:
            - AuthenticationFilter

        - id: catalog-swagger
          uri: http://catalog-service:8081
          predicates:
            - Path=/catalog/swagger-ui/**, /catalog/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: users-swagger
          uri: http://users-service:8083
          predicates:
            - Path=/users/swagger-ui/**, /users/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: order-swagger
          uri: http://order-service:8082
          predicates:
            - Path=/order/swagger-ui/**, /order/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: supports-swagger
          uri: http://supports-service:8085
          predicates:
            - Path=/supports/swagger-ui/**, /supports/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: auth-swagger
          uri: http://auth-service:8084
          predicates:
            - Path=/auth/swagger-ui/**, /auth/v3/api-docs/**
          filters:
            - StripPrefix=1

donatech:
  app:
    jwtSecret: ${JWT_SECRET:donatechSecretKey12345678901234567890123456789012}
