name: donatech-backend-cloud

# ═══════════════════════════════════════════════════════════════════════════
# Stack COMPLETO para despliegue en un único Droplet (Ubuntu 24.04, 8GB RAM).
# Levanta backend + frontend + IA con:
#   docker compose -f docker-compose-cloud.yml up -d
#
# Red interna 'donatech-net': los servicios se comunican por nombre de servicio.
# Solo api-gateway (8080) y frontend (80) exponen puertos al host.
# LLM de kit-ia: proveedor cloud (Groq/DeepSeek) vía .env. Sin ollama.
# kit-ia lee el catálogo por HTTP (db-per-service); no accede a Postgres.
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  # Infraestructura (Bases de Datos Independientes por Microservicio)
  # ─────────────────────────────────────────
  # NOTA: Los volúmenes named mantienen los datos entre reinicios y rebuilds.
  # Los scripts db/postgres-*/01-init.sh solo se ejecutan con el volumen vacío.
  # ─────────────────────────────────────────

  postgres-users:
    image: postgres:16-alpine
    container_name: donatech-postgres-users
    env_file:
      - .env
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
      - ./db/postgres-users:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-catalog:
    image: postgres:16-alpine
    container_name: donatech-postgres-catalog
    env_file:
      - .env
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
      - ./db/postgres-catalog:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    container_name: donatech-postgres-order
    env_file:
      - .env
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
      - ./db/postgres-order:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-supports:
    image: postgres:16-alpine
    container_name: donatech-postgres-supports
    env_file:
      - .env
    volumes:
      - postgres-supports-data:/var/lib/postgresql/data
      - ./db/postgres-supports:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shipping:
    image: postgres:16-alpine
    container_name: donatech-postgres-shipping
    env_file:
      - .env
    volumes:
      - postgres-shipping-data:/var/lib/postgresql/data
      - ./db/postgres-shipping:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: donatech-rabbitmq
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Service Discovery
  # ─────────────────────────────────────────
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: donatech-discovery
    image: donatech/discovery-server:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Microservicios
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: donatech-auth
    image: donatech/auth-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      discovery-server:
        condition: service_healthy

  users-service:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: donatech-users
    image: donatech/users-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      DB_URL: jdbc:postgresql://postgres-users:5432/donatech
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-users:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-service:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    container_name: donatech-catalog
    image: donatech/catalog-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      DB_URL: jdbc:postgresql://postgres-catalog:5432/donatech
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-catalog:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: donatech-order
    image: donatech/order-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      DB_URL: jdbc:postgresql://postgres-order:5432/donatech
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-order:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  supports-service:
    build:
      context: ./supports
      dockerfile: Dockerfile
    container_name: donatech-supports
    image: donatech/supports-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      DB_URL: jdbc:postgresql://postgres-supports:5432/donatech
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-supports:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: donatech-notification
    image: donatech/notification-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  shipping-service:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    container_name: donatech-shipping
    image: donatech/shipping-service:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      DB_URL: jdbc:postgresql://postgres-shipping:5432/donatech
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-shipping:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Microservicio IA — Kit Personalizado (LLM cloud, sin BD ni ollama)
  # ─────────────────────────────────────────
  kit-ia-service:
    build:
      context: ./kit-ia-service
      dockerfile: Dockerfile
    container_name: donatech-kit-ia
    image: donatech/kit-ia-service:latest
    env_file:
      - .env
    environment:
      # LLM cloud (Groq/DeepSeek): LLM_PROVIDER/LLM_API_KEY/LLM_BASE_URL/LLM_MODEL
      # se inyectan desde .env. Lectura del catálogo por HTTP (no BD).
      MS_KITS_URL: http://catalog-service:8081
      USERS_URL: http://users-service:8083
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      APP_NAME: kit-ia-service
      APP_HOST: kit-ia-service
      APP_PORT: 8001
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/kit-ia/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      discovery-server:
        condition: service_healthy
      catalog-service:
        condition: service_started

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: donatech-gateway
    image: donatech/api-gateway:latest
    env_file:
      - .env
    # Sin ports: el acceso externo entra por Caddy (red interna donatech-net).
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx320m"
      # Caddy sirve front y /api en el mismo origen (sin CORS). FRONTEND_URL
      # se usa además para links de soporte en emails (order-service).
      FRONTEND_URL: ${FRONTEND_URL:-https://donatech.onieto.cl}
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      discovery-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Frontend (React + nginx) — sirve estáticos y proxea /api al gateway
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../Frontend/Donatech-Front
      dockerfile: Dockerfile
    container_name: donatech-frontend
    image: donatech/frontend:latest
    # Sin ports: Caddy expone el front al exterior (80/443). Interno en donatech-net.
    environment:
      # Red interna: nginx proxea /api al gateway por nombre de servicio.
      BACKEND_URL: http://api-gateway:8080
    restart: unless-stopped
    networks:
      - donatech-net
    healthcheck:
      # nginx:alpine no incluye curl; busybox wget sí.
      # 127.0.0.1 (no localhost): wget resuelve localhost a ::1 y nginx escucha IPv4.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - api-gateway

  # ─────────────────────────────────────────
  # Reverse proxy + TLS automático (Let's Encrypt). Único punto de entrada.
  # Sirve frontend y /api (gateway) en el mismo origen sobre HTTPS.
  # ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: donatech-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-donatech.onieto.cl}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - donatech-net
    depends_on:
      - api-gateway
      - frontend

  # ─────────────────────────────────────────
  # Backup — pg_dump diario de los 5 Postgres + offsite a DO Spaces
  # ─────────────────────────────────────────
  db-backup:
    build:
      context: ./db-backup
      dockerfile: Dockerfile
    container_name: donatech-db-backup
    image: donatech/db-backup:latest
    env_file:
      - .env
    environment:
      # SPACES_* y POSTGRES_USER/PASSWORD vienen de .env
      BACKUP_TARGETS: "catalog:postgres-catalog,users:postgres-users,order:postgres-order,supports:postgres-supports,shipping:postgres-shipping"
      S3_PREFIX: cloud
      BACKUP_CRON: "0 3 * * *"
      RETENTION_DAYS: "7"
    volumes:
      - backup-data:/backups
    restart: unless-stopped
    networks:
      - donatech-net
    depends_on:
      postgres-catalog:
        condition: service_healthy
      postgres-users:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      postgres-supports:
        condition: service_healthy
      postgres-shipping:
        condition: service_healthy

volumes:
  postgres-users-data:
  postgres-catalog-data:
  postgres-order-data:
  postgres-supports-data:
  postgres-shipping-data:
  backup-data:
  caddy-data:
  caddy-config:

networks:
  donatech-net:
    driver: bridge
