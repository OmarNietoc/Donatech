server:
  port: 8084

spring:
  application:
    name: auth-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

donatech:
  app:
    jwtSecret: ${JWT_SECRET:donatechSecretKey12345678901234567890123456789012}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /auth/v3/api-docs
    config-url: /auth/v3/api-docs/swagger-config
    urls:
      - name: Auth API
        url: /auth/v3/api-docs
