server:
  port: 8087

spring:
  application:
    name: shipping-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/donatech}
    username: ${SHIPPING_DB_USER:shipping_user}
    password: ${SHIPPING_DB_PASS:shipping_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: shipping
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /shipping/v3/api-docs
    config-url: /shipping/v3/api-docs/swagger-config
    urls:
      - name: Shipping API
        url: /shipping/v3/api-docs
