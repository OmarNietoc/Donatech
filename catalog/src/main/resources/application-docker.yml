server:
  port: 8081

spring:
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER:donatech}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /catalog/v3/api-docs
    config-url: /catalog/v3/api-docs
    urls:
      - name: Catalog API
        url: /catalog/v3/api-docs
