services:

  # ─────────────────────────────────────────
  # Infraestructura Cloud (Simulando Bases de Datos Independientes)
  # ─────────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    container_name: donatech-postgres-users
    env_file:
      - .env
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-catalog:
    image: postgres:16-alpine
    container_name: donatech-postgres-catalog
    env_file:
      - .env
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    container_name: donatech-postgres-order
    env_file:
      - .env
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-supports:
    image: postgres:16-alpine
    container_name: donatech-postgres-supports
    env_file:
      - .env
    volumes:
      - postgres-supports-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: donatech-rabbitmq
    env_file:
      - .env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Service Discovery
  # ─────────────────────────────────────────
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: donatech-discovery
    image: donatech/discovery-server:latest
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Microservicios
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: donatech-auth
    image: donatech/auth-service:latest
    env_file:
      - .env
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy

  users-service:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: donatech-users
    image: donatech/users-service:latest
    env_file:
      - .env
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-users:5432/donatech
    depends_on:
      postgres-users:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  catalog-service:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    container_name: donatech-catalog
    image: donatech/catalog-service:latest
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-catalog:5432/donatech
    depends_on:
      postgres-catalog:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: donatech-order
    image: donatech/order-service:latest
    env_file:
      - .env
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-order:5432/donatech
    depends_on:
      postgres-order:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  supports-service:
    build:
      context: ./supports
      dockerfile: Dockerfile
    container_name: donatech-supports
    image: donatech/supports-service:latest
    env_file:
      - .env
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-supports:5432/donatech
    depends_on:
      postgres-supports:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: donatech-gateway
    image: donatech/api-gateway:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy

volumes:
  postgres-users-data:
  postgres-catalog-data:
  postgres-order-data:
  postgres-supports-data:
